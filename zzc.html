<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Selector</title>
<style>
  @font-face {
    font-family: 'HarmonyOS Sans SC';
    src: url('HarmonyOS_Sans_SC_Regular.woff2') format('woff2'),
         url('HarmonyOS_Sans_SC_Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'HarmonyOS Sans SC';
    src: url('HarmonyOS_Sans_SC_Black.woff2') format('woff2'),
         url('HarmonyOS_Sans_SC_Black.ttf') format('truetype');
    font-weight: 900;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030D91;
  }

  .container {
    display: flex;
    width: 100%;
    height: 100%;
  }

  .column {
    flex: 1;
    position: relative;
    overflow: hidden;
    transition: background 0.5s ease;
    background:
      radial-gradient(ellipse 600px 400px at 15% 90%, rgba(70,150,250,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 500px 350px at 70% 10%, rgba(50,130,230,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 350px 250px at 50% 50%, rgba(90,170,245,0.06) 0%, transparent 70%),
      linear-gradient(165deg,
        #020766 0%,
        #030D91 15%,
        #0412c0 35%,
        #0515e0 50%,
        #0410b8 65%,
        #030D91 80%,
        #020660 100%);
    background-size: 100% 100%;
  }

  /* ── Liquid floating orbs ── */
  .column::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 300px 200px at 40% 30%, rgba(120,190,245,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 250px 300px at 70% 70%, rgba(70,140,230,0.08) 0%, transparent 70%);
    animation: liquidDrift 10s ease-in-out infinite;
  }

  @keyframes liquidDrift {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(4%, -2%) scale(1.08); }
    50%  { transform: translate(-2%, 3%) scale(0.94); }
    75%  { transform: translate(-3%, -1%) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* ── Animated light caustic streaks ── */
  .column::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 180px 100px at 20% 60%, rgba(170,210,245,0.06) 0%, transparent 80%),
      radial-gradient(ellipse 150px 120px at 80% 40%, rgba(150,190,240,0.05) 0%, transparent 80%);
    animation: causticShift 14s ease-in-out infinite;
  }

  @keyframes causticShift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    33%  { transform: translate(-2%, 4%) rotate(1deg); }
    66%  { transform: translate(3%, -2%) rotate(-1deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  /* ── Vertical divider lines with glow ── */
  .column:not(:last-child) {
    border-right: 1px solid rgba(255,255,255,0.12);
    box-shadow: 1px 0 8px rgba(90,170,245,0.08);
  }

  /* ── Highlight state — pink theme ── */
  .column.highlight {
    background:
      radial-gradient(ellipse 600px 400px at 15% 90%, rgba(255,150,180,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 500px 350px at 70% 10%, rgba(255,130,165,0.15) 0%, transparent 55%),
      radial-gradient(ellipse 350px 250px at 50% 50%, rgba(255,180,200,0.08) 0%, transparent 70%),
      linear-gradient(165deg,
        #990040 0%,
        #cc0056 15%,
        #FF006C 35%,
        #ff3389 50%,
        #FF006C 65%,
        #cc0056 80%,
        #7f0036 100%) !important;
  }

  .column.highlight::before {
    background:
      radial-gradient(ellipse 300px 200px at 40% 30%, rgba(255,180,200,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 250px 300px at 70% 70%, rgba(255,150,180,0.1) 0%, transparent 70%);
  }

  .column.highlight::after {
    background:
      radial-gradient(ellipse 180px 100px at 20% 60%, rgba(255,210,225,0.08) 0%, transparent 80%),
      radial-gradient(ellipse 150px 120px at 80% 40%, rgba(255,180,200,0.07) 0%, transparent 80%);
  }

  /* ── cf.png — flush top-left, behind text ── */
  .cf-logo {
    position: absolute;
    top: 0;
    left: 0;
    width: 60%;
    opacity: 0.5;
    z-index: 2;
    user-select: none;
    pointer-events: none;
  }

  /* ── Info text — top-left ── */
  .info-text {
    position: absolute;
    top: 4px;
    left: 4px;
    z-index: 5;
    user-select: none;
    pointer-events: none;
  }

  .info-line1 {
    color: #ffffff;
    font-family: 'HarmonyOS Sans SC', 'Noto Sans SC', 'PingFang SC', sans-serif;
    font-size: clamp(1.2rem, 1.9vw, 1.6rem);
    font-weight: 400;
    letter-spacing: 0.06em;
    line-height: 1.5;
  }

  .info-line1 .b {
    font-family: 'HarmonyOS Sans SC', 'Noto Sans SC', sans-serif;
    font-weight: 900;
  }

  .info-line2 {
    color: #ffffff;
    font-family: 'HarmonyOS Sans SC', 'Noto Sans SC', sans-serif;
    font-weight: 900;
    font-size: clamp(1.2rem, 1.9vw, 1.6rem);
    letter-spacing: 0.06em;
    line-height: 1.5;
  }

  /* ── Top-right — character name ── */
  .name-block {
    position: absolute;
    top: 8px;
    right: 0;
    z-index: 5;
    user-select: none;
    pointer-events: none;
  }

  .name {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .name-char {
    color: #ffffff;
    font-family: 'HarmonyOS Sans SC', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight: 900;
    font-size: clamp(3.9rem, 7vw, 5.8rem);
    letter-spacing: 0.08em;
    line-height: 1.05;
    text-shadow: 0 0 8px rgba(255,255,255,0.25);
  }

  /* ── Bottom-right — portrait 1:2 ── */
  .portrait-wrap {
    position: absolute;
    bottom: 0;
    right: 0;
    height: 88%;
    aspect-ratio: 1 / 2;
    z-index: 3;
  }

  .portrait {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* ── Full-screen overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #030D91;
    display: none;
    justify-content: center;
    align-items: center;
  }

  .overlay.active {
    display: flex;
  }

  .overlay img,
  .overlay video {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>

<div class="container">
  <div class="column" id="col0">
    <img class="cf-logo" src="cf.png" alt="" draggable="false">
    <div class="info-text">
      <div class="info-line1"><span class="b">CHENGFENG</span> 2026</div>
      <div class="info-line2">Cuiyong</div>
    </div>
    <div class="name-block">
      <span class="name">崔勇</span>
    </div>
    <div class="portrait-wrap">
      <img class="portrait" src="cy.png" alt="" draggable="false">
    </div>
  </div>

  <div class="column" id="col1">
    <img class="cf-logo" src="cf.png" alt="" draggable="false">
    <div class="info-text">
      <div class="info-line1"><span class="b">CHENGFENG</span> 2026</div>
      <div class="info-line2">Zhang Zhecheng</div>
    </div>
    <div class="name-block">
      <span class="name">张哲诚</span>
    </div>
    <div class="portrait-wrap">
      <img class="portrait" src="zzc.png" alt="" draggable="false">
    </div>
  </div>

  <div class="column" id="col2">
    <img class="cf-logo" src="cf.png" alt="" draggable="false">
    <div class="info-text">
      <div class="info-line1"><span class="b">CHENGFENG</span> 2026</div>
      <div class="info-line2">Zhang Xuefeng</div>
    </div>
    <div class="name-block">
      <span class="name">张雪峰</span>
    </div>
    <div class="portrait-wrap">
      <img class="portrait" src="zxf.png" alt="" draggable="false">
    </div>
  </div>

  <div class="column" id="col3">
    <img class="cf-logo" src="cf.png" alt="" draggable="false">
    <div class="info-text">
      <div class="info-line1"><span class="b">CHENGFENG</span> 2026</div>
      <div class="info-line2">Zhou Jie</div>
    </div>
    <div class="name-block">
      <span class="name">周杰</span>
    </div>
    <div class="portrait-wrap">
      <img class="portrait" src="zj.png" alt="" draggable="false">
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <img id="overlay-img" src="" alt="" draggable="false" style="display:none;">
  <video id="overlay-video" src="Zzcjl1.mp4" preload="auto" style="display:none;" playsinline></video>
</div>

<audio id="m1" src="m1.mp3" preload="auto"></audio>
<audio id="m2" src="m2.mp3" preload="auto"></audio>
<audio id="zxfls" src="zxfls.mp3" preload="auto"></audio>
<audio id="ylzx" src="ylzx.mp3" preload="auto"></audio>
<audio id="yys" src="yys.mp3" preload="auto"></audio>
<audio id="wmdb" src="wmdb.mp3" preload="auto"></audio>

<script>
(function() {
  var COL_COUNT = 4;
  var SCROLL_INTERVAL = 300;
  var stopImages = ['tt.png', 'hjltt.png', 'zxftt.png', 'zjtt.png'];

  var currentCol = 0;
  var isScrolling = false;
  var timerId = null;
  var delayId = null;
  var columns = document.querySelectorAll('.column');
  var overlay = document.getElementById('overlay');
  var overlayImg = document.getElementById('overlay-img');
  var overlayVideo = document.getElementById('overlay-video');
  var m1 = document.getElementById('m1');
  var m2 = document.getElementById('m2');
  var zxfls = document.getElementById('zxfls');
  var ylzx = document.getElementById('ylzx');
  var yys = document.getElementById('yys');
  var wmdb = document.getElementById('wmdb');


  function highlight(colIndex) {
    for (var i = 0; i < columns.length; i++) {
      columns[i].classList.remove('highlight');
    }
    columns[colIndex].classList.add('highlight');
    currentCol = colIndex;
  }

  function cancelDelay() {
    if (delayId) {
      clearTimeout(delayId);
      delayId = null;
    }
  }

  function startScrolling() {
    if (isScrolling) return;
    isScrolling = true;
    cancelDelay();
    overlay.classList.remove('active');
    overlayVideo.pause();
    overlayVideo.style.display = 'none';
    overlayImg.style.display = 'none';
    m2.pause();
    zxfls.pause();
    ylzx.pause();
    yys.pause();
    wmdb.pause();
    m1.currentTime = 0;
    m1.play();
    highlight(currentCol);
    timerId = setInterval(function() {
      currentCol = (currentCol + 1) % COL_COUNT;
      highlight(currentCol);
    }, SCROLL_INTERVAL);
  }

  function stopScrolling() {
    if (!isScrolling) return;
    isScrolling = false;
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }
    if (!m1.paused) {
      m1.pause();
    }
    m2.currentTime = 0;
    m2.play();
    var stoppedCol = currentCol;
    delayId = setTimeout(function() {
      overlay.classList.add('active');
      if (stoppedCol === 1) {
        overlayImg.style.display = 'none';
        overlayVideo.style.display = 'block';
        overlayVideo.currentTime = 0;
        overlayVideo.play();
        m2.pause();
      } else {
        overlayImg.style.display = 'block';
        overlayVideo.style.display = 'none';
        overlayImg.src = stopImages[stoppedCol];
      }
      if (stoppedCol === 0) {
        m2.pause();
        wmdb.currentTime = 0;
        wmdb.play();
      }
      if (stoppedCol === 2) {
        m2.pause();
        zxfls.currentTime = 0;
        zxfls.play();
      }
      if (stoppedCol === 3) {
        m2.pause();
        ylzx.currentTime = 0;
        ylzx.play();
      }
      delayId = null;
    }, 3500);
  }

  function toggle() {
    if (isScrolling) {
      stopScrolling();
    } else {
      startScrolling();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space') {
      e.preventDefault();
      toggle();
    }
    if (e.code === 'Escape') {
      cancelDelay();
      overlay.classList.remove('active');
      overlayVideo.pause();
      overlayVideo.style.display = 'none';
      overlayImg.style.display = 'none';
      zxfls.pause();
      ylzx.pause();
      yys.pause();
      wmdb.pause();
    }
  });

  document.addEventListener('click', function() {
    toggle();
  });

  // Split vertical names into individual characters for cross-platform rendering
  var nameEls = document.querySelectorAll('.name');
  for (var ni = 0; ni < nameEls.length; ni++) {
    var el = nameEls[ni];
    var text = el.textContent;
    var html = '';
    for (var ci = 0; ci < text.length; ci++) {
      html += '<span class="name-char">' + text.charAt(ci) + '</span>';
    }
    el.innerHTML = html;
  }

  highlight(0);
})();
</script>

</body>
</html>
